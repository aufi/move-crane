- op: replace
  path: /metadata/name
  value: sample-s2i-bc
- op: replace
  path: /metadata/namespace
  value: ns-a
- op: add
  path: /metadata/annotations
  value:
    migration.konveyor.io/generated-from: build.openshift.io/v1/BuildConfig/ns-a/sample-s2i-bc
- op: replace
  path: /spec/source/type
  value: Git
- op: replace
  path: /spec/source/git/url
  value: https://github.com/example/sample-s2i.git
- op: replace
  path: /spec/strategy/name
  value: source-to-image
- op: replace
  path: /spec/output/image
  value: quay.io/example/sample-s2i:latest
- op: replace
  path: /spec/output/pushSecret
  value: reg-push-secret
- op: replace
  path: /spec/paramValues
  value:
    - name: builder-image
      value: registry.access.redhat.com/ubi8/openjdk-17:latest
