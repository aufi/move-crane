---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: nodejs-docker-build
  namespace: buildconfig-test
  labels:
    app: nodejs-app
    build-type: docker
    tier: backend
spec:
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
      env:
      - name: NODE_ENV
        value: production
      - name: BUILD_LOGLEVEL
        value: verbose
      buildArgs:
      - name: NPM_MIRROR
        value: https://registry.npmjs.org/
      - name: NODE_VERSION
        value: "18"
      noCache: false
      forcePull: false
  source:
    type: Git
    git:
      uri: https://github.com/sclorg/nodejs-ex
      ref: master
    contextDir: ""
  output:
    to:
      kind: DockerImage
      name: quay.io/example/nodejs-app:latest
    pushSecret:
      name: quay-push-secret
  triggers:
  - type: ConfigChange
  - type: ImageChange
